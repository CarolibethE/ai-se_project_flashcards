<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash cards app</title>
    <meta name="author" content="Carolibeth" />
    <meta
      name="description"
      content="A flash card app designed to help students organize study material for a better way of understanding material"
    />
    <meta
      name="keywords"
      content="study aids, flashcards, learning materials"
    />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/vendor/normalize.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="#home">Flash Cards</a>
      </h1>

      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#home">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content" id="main-content">

      <section class="decks" id="home">
        <h2 class="decks__title">My Decks</h2>

        <div class="wrapping-row">
          <ul class="decks__list wrapping-row__display-contents"></ul>

          <template id="deck-template">
            <li class="deck">
              <a class="deck__link" href="#"></a>

              <h3 class="deck__title"></h3>

              <div class="deck__row">
                <p class="deck__count"></p>

                <button class="deck__delete-btn" type="button" aria-label="Delete this deck">
                  <img src="assets/images/delete.svg" alt="" />
                </button>
              </div>
            </li>
          </template>

          <button class="decks__new-decks-btn" type="button">+ New Deck</button>
        </div>
      </section>

       <section class="carousel" id="carousel" hidden>
        <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
        <div class="carousel__row">
          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>
          <div class="carousel__controls">
            <button class="carousel__btn carousel__btn_type_left carousel__btn_disabled" type="button" aria-label="Go to previous card">
              <img src="assets/images/left.svg" alt=""/>
            </button>
            <button class="carousel__btn carousel__btn_type_right" type="button" aria-label="Next card">
              <img src="assets/images/right.svg" alt=""/>
            </button>
          </div>
        </div>
        <div class="carousel__flip">
          <button class="carousel__btn carousel__btn_type_flip" type="button" aria-label="Flip card">
            <img src="assets/images/flip.svg" alt=""/>
          </button>
        </div>
      </section>
      <section class="page__section" id="not-found" hidden>
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__text">Sorry, the page you requested could not be found.</p>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">&copy;2026 Carolibeth</p>
    </footer>

    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
